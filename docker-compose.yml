services:
  postgres:
    image: postgres:16-alpine
    container_name: car-dealer-postgres
    environment:
      POSTGRES_DB: car_dealer
      POSTGRES_USER: car_dealer
      POSTGRES_PASSWORD: car_dealer_password
    ports:
      - "55433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_dealer -d car_dealer"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
